<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExpenseFlow Pro</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <div class="container">

    <!-- Header -->
    <header>
      <h1>💰 ExpenseFlow Pro</h1>
      <button id="themeToggle">
        <i class="fa-solid fa-moon"></i>
      </button>
    </header>

    <!-- Summary Cards -->
    <div class="summary-cards">

      <div class="card balance">
        <h3>Total Balance</h3>
        <h2 id="balance">₹0.00</h2>
      </div>

      <div class="card income">
        <h3>Income</h3>
        <h2 id="income">₹0.00</h2>
      </div>

      <div class="card expense">
        <h3>Expense</h3>
        <h2 id="expense">₹0.00</h2>
      </div>

    </div>

    <!-- Add Transaction -->
    <div class="form-card">

      <h3>Add Transaction</h3>

      <form id="form">

        <input type="text" id="text" placeholder="Enter Description" required>

        <input type="number" id="amount" placeholder="Enter Amount (+/-)" required>

        <select id="category">
          <option value="Salary">Salary</option>
          <option value="Food">Food</option>
          <option value="Travel">Travel</option>
          <option value="Shopping">Shopping</option>
          <option value="Bills">Bills</option>
        </select>

        <select id="type">
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>

        <button type="submit">
          Add Transaction
        </button>

      </form>

    </div>

    <!-- Search -->
    <div class="search-box">
      <input type="text" id="search" placeholder="🔍 Search Transactions">
    </div>

    <!-- Transaction List -->
    <div class="transaction-card">

      <h3>Recent Transactions</h3>

      <ul id="transactions"></ul>

    </div>

  </div>


  <script src="js/script.js"></script>

</body>

</html>
